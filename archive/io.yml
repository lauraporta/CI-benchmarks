name: io

# Third experiment: does file read/write + snakemake orchestration introduce
# run-to-run variance, independent of the cellpose/suite2p compute?
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "tests/test_io_bench.py"
      - "plot_io.py"
      - ".github/workflows/io.yml"

jobs:
  io:
    name: ${{ matrix.os }} py${{ matrix.python-version }} run${{ matrix.run }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.14"]
        # I/O is cheap, so take more samples to pin the variance down.
        run: [1, 2, 3, 4, 5]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Minimal deps: this experiment is I/O only, no torch/cellpose needed.
      - name: Install
        run: pip install snakemake numpy pytest pytest-benchmark
      - name: IO benchmark
        run: pytest tests/test_io_bench.py --benchmark-json=io-${{ matrix.os }}-py${{ matrix.python-version }}-run${{ matrix.run }}.json
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: io-${{ matrix.os }}-py${{ matrix.python-version }}-run${{ matrix.run }}
          path: io-*.json

  plot:
    needs: io
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install matplotlib
      - name: Download all io artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Make io plot
        run: python plot_io.py artifacts
      - name: Upload plot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: io-summary
          path: io_summary.png
      - name: Commit plot to repo
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add io_summary.png
          if git diff --staged --quiet; then
            echo "no plot change"
          else
            git commit -m "CI: refresh io plot [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
