name: bench

# Runs on PRs (like the NIU repos), on push to main, and on manual dispatch so
# you can fire repeated samples on demand.
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  bench:
    name: ${{ matrix.os }} py${{ matrix.python-version }} run${{ matrix.run }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Never cancel siblings: we need the full distribution across legs, not a
      # fail-fast truncation (that truncation is itself a source of the
      # variance we are investigating in the real repo).
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]
        # Repeat the whole job to sample the runner-luck dimension.
        run: [1, 2, 3]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Benchmark
        run: |
          pytest --benchmark-json=bench-${{ matrix.os }}-py${{ matrix.python-version }}-run${{ matrix.run }}.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.os }}-py${{ matrix.python-version }}-run${{ matrix.run }}
          path: bench-*.json

  # Aggregate every leg's JSON into a single summary plot, uploaded as an
  # artifact. Runs even if some bench legs failed.
  plot:
    needs: bench
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write   # so the job can commit the refreshed results back
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install plotting deps
        run: pip install matplotlib

      - name: Download all bench artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate results (plot + tables)
        run: |
          mkdir -p results
          python analyze.py artifacts | tee results/summary.txt
          python plot.py artifacts
          mv bench_summary.png results/
          {
            echo "# Results (auto-generated by CI)"
            echo
            echo "_Raw numbers only — conclusions are drawn separately, by hand._"
            echo "_Run \`${GITHUB_RUN_ID}\`, commit \`${GITHUB_SHA}\`._"
            echo
            echo "![benchmark summary](bench_summary.png)"
            echo
            echo '```'
            cat results/summary.txt
            echo '```'
          } > results/RESULTS.md

      - name: Upload summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-summary
          path: results/

      # Write the refreshed plot + tables back into the repo so they are always
      # current without a manual edit. Skipped on PRs (the checkout is a detached
      # merge ref); runs on push-to-main and manual dispatch. [skip ci] avoids a
      # trigger loop.
      - name: Commit results to repo
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          if git diff --staged --quiet; then
            echo "no results change"
          else
            git commit -m "CI: refresh benchmark results [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
