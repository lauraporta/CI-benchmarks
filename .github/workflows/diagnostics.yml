name: diagnostics

# Second experiment: (1) why is torch CPU inference so much slower on ubuntu,
# (2) does the suite2p registration stage carry the run-to-run variance.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "tests/test_torch_diag.py"
      - "tests/test_suite2p_step.py"
      - ".github/workflows/diagnostics.yml"
      - "pyproject.toml"

jobs:
  diag:
    name: ${{ matrix.os }} py${{ matrix.python-version }} run${{ matrix.run }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.14"]
        run: [1, 2, 3]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: torch + suite2p diagnostics
        # single line: Windows runs this in PowerShell, where '\' is not a line
        # continuation (that broke the previous multi-line version).
        run: pytest tests/test_torch_diag.py tests/test_suite2p_step.py --benchmark-json=diag-${{ matrix.os }}-py${{ matrix.python-version }}-run${{ matrix.run }}.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diag-${{ matrix.os }}-py${{ matrix.python-version }}-run${{ matrix.run }}
          path: |
            diag-*.json
            torch-config-*.txt

  plot:
    needs: diag
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install matplotlib
      - name: Download all diag artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Make diagnostics plot
        run: python plot_diag.py artifacts
      - name: Upload plot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diag-summary
          path: diag_summary.png
      # Commit the refreshed figure back (push-to-main / dispatch only; PRs use
      # the artifact). [skip ci] avoids a trigger loop.
      - name: Commit plot to repo
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add diag_summary.png
          if git diff --staged --quiet; then
            echo "no plot change"
          else
            git commit -m "CI: refresh diagnostics plot [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
